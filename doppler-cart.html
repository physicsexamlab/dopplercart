<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doppler Cart Monitor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;600;800&display=swap');

  :root {
    --bg:        #ffffff;
    --panel:     #ffffff;
    --border:    #c4ccd4;
    --text:      #1a2b3c;
    --dim:       #5a6b7a;
    --header-bg: #ffffff;

    --col-pos:   #0077cc;
    --col-vel:   #4a8c00;
    --col-freq:  #cc6600;
    --danger:    #d42045;
    --warn:      #b86e00;
    --accent2:   #008855;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg); color: var(--text);
    font-family: 'Exo 2', sans-serif; font-weight: 300;
    min-height: 100vh; display: flex; flex-direction: column;
  }

  header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px; border-bottom: 1px solid var(--border);
    background: var(--header-bg);
  }
  .logo {
    font-size: 1.15rem; font-weight: 800; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--col-pos);
  }
  .logo em { font-style: normal; color: var(--col-freq); }

  .status-group { display: flex; gap: 20px; align-items: center; }

  .status-badge {
    display: flex; align-items: center; gap: 7px;
    font-family: 'Share Tech Mono', monospace; font-size: 0.78rem; color: var(--dim);
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); }
  .status-badge.connected { color: var(--accent2); }
  .status-badge.connected .status-dot { background: var(--accent2); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  main {
    position: relative; z-index: 1; flex: 1;
    display: flex; flex-direction: column; gap: 18px;
    padding: 20px 28px; max-width: 1400px; width: 100%; margin: 0 auto;
  }

  .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  button {
    font-family: 'Exo 2', sans-serif; font-weight: 600; font-size: 0.82rem;
    letter-spacing: 0.08em; text-transform: uppercase; padding: 9px 20px;
    border-radius: 4px; border: 1px solid transparent; cursor: pointer;
    transition: all 0.2s; background: transparent;
  }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-connect-cart { border-color: var(--col-pos); color: var(--col-pos); }
  .btn-connect-cart:hover:not(:disabled) { background: var(--col-pos); color: #fff; }
  .btn-connect-freq { border-color: var(--col-freq); color: var(--col-freq); }
  .btn-connect-freq:hover:not(:disabled) { background: var(--col-freq); color: #fff; }
  .btn-start { border-color: var(--accent2); color: var(--accent2); }
  .btn-start:hover:not(:disabled) { background: var(--accent2); color: #fff; }
  .btn-stop  { border-color: var(--danger); color: var(--danger); }
  .btn-stop:hover:not(:disabled) { background: var(--danger); color: #fff; }
  .btn-reset { border-color: var(--dim); color: var(--dim); }
  .btn-reset:hover:not(:disabled) { background: var(--dim); color: #fff; }
  .btn-csv   { border-color: var(--warn); color: var(--warn); margin-left: auto; }
  .btn-csv:hover:not(:disabled) { background: var(--warn); color: #fff; }

  /* 統計4枚 + 信号品質 を 1 本の横ストリップに統合（縦スペース節約） */
  .info-strip { display: flex; gap: 10px; flex-wrap: wrap; }
  .info-strip > * { flex: 1 1 0; min-width: 132px; }
  .stat-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
    padding: 12px 16px;
  }
  .stat-card.pos  { border-left: 3px solid var(--col-pos); }
  .stat-card.vel  { border-left: 3px solid var(--col-vel); }
  .stat-card.freq { border-left: 3px solid var(--col-freq); }
  .stat-label { font-size: 0.65rem; text-transform: uppercase; color: var(--dim); margin-bottom: 4px; }
  .stat-value { font-family: 'Share Tech Mono', monospace; font-size: 1.4rem; }

  /* 時系列(位置/速度/周波数)は常に縦積み・時間軸共有。
     散布図は横軸が速度なので独立 — 広い画面では右へ、狭い画面では下へ。 */
  .chart-area     { display: flex; flex-direction: column; gap: 16px; }
  .timeseries-col { display: flex; flex-direction: column; gap: 16px; flex: 1 1 auto; min-width: 0; }
  .scatter-col    { display: flex; flex: 1 1 auto; min-width: 0; }
  .scatter-col > .chart-panel { flex: 1 1 auto; width: 100%; }
  @media (min-width: 1200px) {
    .chart-area     { flex-direction: row; align-items: stretch; }
    .timeseries-col { flex: 1 1 62%; }
    .scatter-col    { flex: 1 1 38%; }
  }

  .chart-panel {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px 18px;
  }
  .chart-panel.pos  { border-top: 2px solid var(--col-pos); }
  .chart-panel.vel  { border-top: 2px solid var(--col-vel); }
  .chart-panel.freq { border-top: 2px solid var(--col-freq); }
  .shared-time-axis {
    font-family: 'Share Tech Mono', monospace; font-size: 0.72rem;
    color: var(--dim); text-align: center; letter-spacing: 0.08em;
    text-transform: uppercase; margin-top: -6px;
  }
  .chart-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .chart-title  { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--dim); }

  /* ノートPC〜短いビューポート（MBP14/教室Chromebook/Surface等）で枠を圧縮。
     高さ>900px の大型外部モニタでは現状の余裕ある余白を維持する。
     圧縮分は resizeCanvases() の実測計算で自動的にグラフ高さへ還元される。 */
  @media (max-height: 900px) {
    main             { gap: 10px; padding: 10px 28px; }
    header           { padding: 8px 28px; }
    footer           { padding: 6px 28px 8px; }
    .controls button { padding: 6px 16px; }
    .stat-card       { padding: 8px 14px; }
    .stat-value      { font-size: 1.05rem; }
    .chart-area      { gap: 8px; }
    .timeseries-col  { gap: 8px; }
    .chart-panel     { padding: 8px 18px; }
    .chart-header    { margin-bottom: 6px; }
  }

  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--panel); padding: 24px; width: min(720px, 95vw);
    border-radius: 8px; display: flex; flex-direction: column; gap: 14px;
  }
  textarea.csv-out {
    min-height: 300px; font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem; padding: 10px; border: 1px solid var(--border); border-radius: 4px;
  }
  .modal-footer { display: flex; justify-content: space-between; align-items: center; }
</style>
</head>
<body>

<header>
  <div class="logo">Doppler Cart Monitor</div>
  <div class="status-group">
    <div class="status-badge" id="cartBadge">
      <div class="status-dot"></div>
      <span id="cartText">CART: —</span>
    </div>
    <div class="status-badge" id="freqBadge">
      <div class="status-dot"></div>
      <span id="freqText">FREQ: —</span>
    </div>
  </div>
</header>

<main>
  <div class="controls">
    <button class="btn-connect-cart" id="btnConnectCart">Connect Smart Cart</button>
    <button class="btn-connect-freq" id="btnConnectFreq">Connect Freq Sensor</button>
    <button class="btn-start" id="btnStart" disabled>Record</button>
    <button class="btn-stop"  id="btnStop"  disabled>Stop</button>
    <button class="btn-reset" id="btnReset" disabled>Reset</button>
    <button class="btn-csv"   id="btnCsv"   disabled>CSV Export</button>
  </div>

  <div class="info-strip">
    <div class="stat-card pos">
      <div class="stat-label">位置</div>
      <div class="stat-value" id="sPosLast">—</div>
    </div>
    <div class="stat-card vel">
      <div class="stat-label">速度</div>
      <div class="stat-value" id="sVelLast">—</div>
    </div>
    <div class="stat-card freq">
      <div class="stat-label">周波数</div>
      <div class="stat-value" id="sFreqLast">—</div>
    </div>
    <div class="stat-card" style="border-left:3px solid var(--accent2);">
      <div class="stat-label">f₀ (静止時中央値) / 振幅</div>
      <div class="stat-value" id="sFRefAmp" style="font-size:1.05rem;">—</div>
    </div>
    <div class="stat-card" id="qualityBar" style="border-left:3px solid var(--dim);">
      <div class="stat-label">信号品質</div>
      <div class="stat-value" style="font-size:0.95rem; display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;">
        <span id="sQualityBadge" style="font-weight:700; color:var(--dim);">—</span>
        <span id="sQualityDetail" style="font-family:'Exo 2',sans-serif; font-weight:300; font-size:0.72rem; color:var(--dim);"></span>
      </div>
    </div>
  </div>

  <div class="chart-area">
    <div class="timeseries-col">
      <div class="chart-panel pos">
        <div class="chart-header">
          <div class="chart-title">位置(m)</div>
          <div id="posAxisLabel" style="font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--dim);"></div>
        </div>
        <canvas id="chartPos" height="180"></canvas>
      </div>
      <div class="chart-panel vel">
        <div class="chart-header">
          <div class="chart-title">速度(m/s)</div>
          <div id="velAxisLabel" style="font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--dim);"></div>
        </div>
        <canvas id="chartVel" height="140"></canvas>
      </div>
      <div class="chart-panel freq">
        <div class="chart-header">
          <div class="chart-title">周波数 (Hz)</div>
          <div id="freqAxisLabel" style="font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--dim);"></div>
        </div>
        <canvas id="chartFreq" height="180"></canvas>
      </div>
      <div class="shared-time-axis">時間 (s)</div>
    </div>

    <div class="scatter-col">
      <div class="chart-panel" style="border-top:2px solid #444;">
        <div class="chart-header">
          <div class="chart-title">速度 (m/s) と 周波数シフト Δf = f<sub>obs</sub> − f₀ (Hz) の散布図</div>
          <div id="scatterInfo" style="font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--dim);"></div>
        </div>
        <canvas id="chartScatter" height="260"></canvas>
      </div>
    </div>
  </div>
</main>

<footer style="position:relative;z-index:1;text-align:center;padding:10px 28px 14px;font-size:0.65rem;color:var(--dim);border-top:1px solid var(--border);">
  Physics Exam Lab - Doppler Cart &nbsp;|&nbsp;
  Copyright &copy; 2026 一般社団法人 国際物理オリンピック2023記念協会 &nbsp;|&nbsp;
  <a href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank" rel="noopener"
     style="color:var(--dim);text-decoration:underline;">CC BY-NC 4.0</a>
</footer>

<div class="modal-overlay" id="csvModal">
  <div class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2 style="font-size:1rem; font-weight:600;">CSV Data</h2>
      <button id="btnCloseModal" style="border:none; background:none; font-size:1.5rem; cursor:pointer; line-height:1;">✕</button>
    </div>
    <textarea class="csv-out" id="csvOutput" readonly></textarea>
    <div class="modal-footer">
      <span id="csvRowCount" style="font-size:0.75rem; color:var(--dim);"></span>
      <div style="display:flex; gap:8px;">
        <button class="btn-reset" id="btnCopy">Copy</button>
        <button class="btn-csv"   id="btnDownload">Download</button>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  定数
// ═══════════════════════════════════════════════

// PASCO Smart Cart UUIDs
const ALL_PASCO_UUIDS = [];
for (let s = 0; s <= 9; s++) {
  ALL_PASCO_UUIDS.push(`4a5c000${s}-0000-0000-0000-5c1e741f1c00`);
  for (let c = 1; c <= 9; c++) {
    ALL_PASCO_UUIDS.push(`4a5c000${s}-000${c}-0000-0000-5c1e741f1c00`);
  }
}
const DEVICE_SERVICE    = '4a5c0000-0000-0000-0000-5c1e741f1c00';
const DEVICE_CMD_CHAR   = '4a5c0000-0002-0000-0000-5c1e741f1c00';
const POSITION_SERVICE  = '4a5c0003-0000-0000-0000-5c1e741f1c00';
const POSITION_CMD_CHAR  = '4a5c0003-0002-0000-0000-5c1e741f1c00';
const POSITION_BURST_CHAR = '4a5c0003-0004-0000-0000-5c1e741f1c00';
const POSITION_ACK_CHAR  = '4a5c0003-0005-0000-0000-5c1e741f1c00';

const POS_RATE_HZ   = 100;
const POS_PERIOD_MS = 1000 / POS_RATE_HZ;  // 10ms

const POS_SCALE          = 0.09895 / 816;  // count → meter

const MAX_POINTS         = 3000;

// ESP32 BLE 遅延補正（n800-spectrum と同一メカニズム）
const SAMPLING_TAIL_MS       = 37;
const SAMPLING_TAIL_ADJ_FIXED = -40;

const FREQ_GAP_THRESHOLD_MS = 180;
const CSV_VEL_HALF_WIN = 5;

// BLE位置バースト：rawChange スパイク除去（0.09895/816 m/count × 100Hz = 0.01212 m/s/count）
// rawChange=200 → 2.4 m/s。実験室カートの物理的最大速度を大幅に上回る値をスキップ
const RAW_CHANGE_MAX = 200;

// I/Q センサ定数（doppler-cart-iq.ino と一致させること）
const F0          = 2000.0;
// バイナリパケット形式（doppler-cart-continuous-sampling.ino Stage 2a-r1 と一致）
//   offset  size  type         field
//   ------  ----  -----------  ----------------------------------------
//   0       4     float32 LE   t_esp_s
//   4       4     float32 LE   freq_hz (-1.0 = 無効、ファームウェア推定値)
//   8       4     float32 LE   amplitude
//   12      4     float32 LE   theta_raw (atan2(im,re)、ドロップ後も値あり)
//   16      4     uint32  LE   diag = (drop_delta<<16) | (dt_us & 0xFFFF)
//                              下位16bit = dt_us mod 65536 (前 notify 経過 [µs])
//                              上位16bit = drop_delta (このブロックで失われた
//                                          DMA サンプル数。>0 なら freq_hz=-1)
const PACKET_TOTAL_BYTES = 20;

// ═══════════════════════════════════════════════
//  Smart Cart 状態
// ═══════════════════════════════════════════════
let cartDevice       = null;
let posCmdChar       = null;
let posAckChar       = null;
let cartDevCmdChar   = null;  // device service の CMD characteristic (re-arm 用)
let isCartConnected  = false;

let countAccumulated  = 0;
let lastPacketSeq     = -1;
let latestPosition    = 0;
let latestVelocity    = 0;
let lastNotifyTime    = 0;
let lastNotifyPos     = 0;
let posBurstCarry     = [];
let lastSampleEndTime = 0;

// ═══════════════════════════════════════════════
//  Freq Sensor (ESP32 I/Q) 状態
// ═══════════════════════════════════════════════
let freqDevice      = null;
let freqChar        = null;
let isFreqConnected = false;
let prevFreqEspTime  = -1;
let firstFreqEspTime = -1;
let firstFreqRecvMs  = -1;

// freq_clean 生成（2026-05-13 改訂: 中央化窓 ±2 / 群遅延 ~0ms）
//
// 旧来の EMA-gate を置き換える理由:
//   may10 データの実測 (idx 32: amp=193 で freq_hz=1990.18, 周辺と -3 Hz 乖離) より、
//   音源運動中の random scatter は「振幅 200〜400 の中品質フレームの位相ジッタ」が
//   主因と判定。EMA-gate は単発スパイク (>2+8|v| Hz) を弾くだけで、中振幅の
//   ±1〜2 Hz ジッタは通過させてしまう。
//
// 新方式: 連続5ブロックの (t, θ_unwrapped) を振幅重み付きで線形回帰し、
//   その傾き から freq_clean を再構成。√5 ≈ 2.2× のノイズ低減 + outlier の影響を
//   重みで自然に低下させる。位相を unwrap してから扱うので、xtal バイアスに
//   よる定数 dtheta オフセット (≈ -1.0 rad/block) も問題なく吸収される。
//
// 中央化窓 ±1 (2026-05-13 改訂2):
//   slope は窓 [K-2..K] の平均 dθ/dt なので、物理的には窓の中央 (K-1) 時点の
//   瞬時周波数を表す。よって freq_clean を現フレーム K ではなく 中央フレーム
//   K-1 へ back-fill する。窓幅 ±50ms は CSV vel (`posCentralDiffVel(halfWin=5)`
//   = 100ms 中心化) の半窓 ±50ms と物理的に一致し、両者が同じだけ「未来」を
//   見るため加速開始時の anticipation も視覚的に揃う。
//   初期実装 (±2, 5-tap) では「v=0 のフレームで Δf=-0.6 Hz が出る」
//   anticipation アーチファクトが顕在化したため、窓幅を半減した
//   (スマホが動く3 厳密評価, 2026-05-13)。
//   代償: ノイズ低減は √3 ≈ 1.7× (5-tap の √5 = 2.24× から軽量化)。
//   group delay は 0ms のまま。表示は最新フレームから 1 frame (50ms) 遅れる。
const FREQ_STARTUP_SKIP    = 5;      // 録画開始直後 N フレームを無効化（録画前 theta 汚染）
const FREQ_AMP_GATE_ENTRY  = 100.0;  // tracking_break 後に追跡再開する閾値 (高め=安全な再開)
const FREQ_AMP_GATE_HOLD   = 75.0;  // 既に tracking 中なら維持する閾値 (ヒステリシス)
                                     // ターンアラウンド付近の単発 amp dip (multipath null) を
                                     // 吸収して 150ms gap を防ぐ。PLL unwrap が dip 中も働く。
const FREQ_POLY_WIN     = 3;         // 回帰ウィンドウ (フレーム数). 中央化窓 ±1:
                                     // 3 フレーム揃ったら slope を 中央 (buf[1])
                                     // に対応する freqSession entry へ back-fill。
                                     // ±50ms 窓は CSV vel 半窓 ±50ms に一致。
const FREQ_POLY_AMP_CAP = 800;       // 重みとして用いる振幅の頭打ち (一点支配を防ぐ)
const FREQ_GAP_GATE_HZ  = 8.0;       // freq_hz - 回帰推定値 がこの値超えたら raw を outlier 扱い

let freqFrameCount    = 0;     // 録画開始からのフレーム数（startup skip 用）
let thetaUnwrappedAcc = null;  // 連続位相アキュムレータ (rad)
let thetaLastRaw      = null;  // 直前ブロックの wrap された theta_raw (rad)
let thetaLastT        = null;  // 直前ブロックの elapsed_s (PLL 予測の dt 計算用)
let polyBuffer        = [];    // 直近 (t_s, theta_unwrapped, amp) のサンプル群
let totalDropCount    = 0;     // 累積 DMA drop_delta 合計 (診断表示用)
let lastSlopeRadPerS  = null;  // 直前 fit の slope (PLL-guided unwrap 用)
let freqTracking      = false; // ヒステリシスゲート用: tracking 中か (HOLD/ENTRY 切替)

// theta_raw の連続解凍 + 振幅重み付き線形回帰で freq_clean を生成する。
// 中央化窓 ±1: slope は窓 [t_0..t_2] の平均 dθ/dt なので、これを 中央フレーム
//   (buf[1]) の瞬時周波数として扱う (呼び出し側で back-fill)。
//   厳密に 3 フレーム揃うまで null を返す (ramp-up 100ms、tracking_break
//   復帰後も同様)。
// 戻り値: { freq, slope, n } または null (バッファ不足/特異)
function fitFreqFromTheta() {
  const buf = polyBuffer;
  // 中央化のため厳密に FREQ_POLY_WIN フレーム揃うまで待つ。
  if (buf.length < FREQ_POLY_WIN) return null;
  let sw=0, st=0, sth=0, stt=0, stth=0;
  for (const e of buf) {
    const w = Math.min(e.amp, FREQ_POLY_AMP_CAP);
    sw   += w;
    st   += w * e.t;
    sth  += w * e.theta;
    stt  += w * e.t * e.t;
    stth += w * e.t * e.theta;
  }
  if (sw <= 0) return null;
  const tMean = st  / sw;
  const Stt   = stt  - sw * tMean * tMean;
  if (Math.abs(Stt) < 1e-12) return null;
  const Sth   = stth - sw * tMean * (sth / sw);
  const slope_rad_per_s = Sth / Stt;   // dθ/dt [rad/s]
  // θ は (signal_freq - F0_assumed) を時間積分した位相に対応するため、
  //   freq = F0 + slope/(2π)
  const freq = F0 + slope_rad_per_s / (2 * Math.PI);
  return { freq, slope: slope_rad_per_s, n: buf.length };
}

function resetThetaTracking() {
  // tracking_break (短時間 amp dip) で呼ぶ。
  // lastSlopeRadPerS は **意図的に保持** する: 復帰直後のフレームの PLL unwrap
  // bootstrap に使うため。null にすると freq_hz fallback に頼ることになり、
  // 復帰時の freq_hz が multipath outlier (例: 真の 1996 Hz が 2011 と読まれる) だと、
  // dth の k 候補選択を誤って sign flip → +20 Hz の lock-in 暴走に陥る (実測 04-43-06)。
  // セッション境界 (Reset / startRecording) では明示的に null クリアする。
  thetaUnwrappedAcc = null;
  thetaLastRaw      = null;
  thetaLastT        = null;
  polyBuffer        = [];
  freqTracking      = false;
}

// 絶対周波数校正: f0 校正係数 = F0 / fRef
// 静止時の median freq_hz (= fRef) を音源真値 F0=2000Hz として表示する。
// ESP32 xtal が +1573 ppm 程度速いため、firmware は 2000Hz 音源を 1996.86Hz と
// 報告するが、表示用に × (F0/fRef) を掛けて 2000.00 Hz として見せる。
// Doppler 比は不変なので、scatter 解析の slope は係数で同様に scale されるだけ
// (R² や% 表示は係数を考慮済み)。
function calibrationFactor() {
  const fRef = computeFRef();
  if (!isFinite(fRef) || fRef < F0 - 100 || fRef > F0 + 100) return 1.0;
  return F0 / fRef;
}

// ═══════════════════════════════════════════════
//  録画状態
// ═══════════════════════════════════════════════
let isRecording     = false;
let recordStartTime = 0;
let scatterRunCount = 0;  // §4.4-M: 累積走行数（startRecording で +1、resetAll で 0）

const samplingTailAdjMs = SAMPLING_TAIL_ADJ_FIXED;
let bleStallCount   = 0;

// ═══════════════════════════════════════════════
//  データバッファ
// ═══════════════════════════════════════════════
let posSession  = [];  // { t_ms, elapsed_s, pos_m, vel_ms }
let freqSession = [];  // { t_true_ms, elapsed_s, freq_hz, freq_clean, amplitude,
                       //   gap_ok, theta_raw, dt_us }

let posValues       = [];
let velValues       = [];
let velSmoothValues = [];
let freqValues      = [];
let posTimeValues   = [];
let freqTimeValues  = [];

let recordEndTime_s   = 0;

const VEL_SMOOTH_WIN  = 5;

// ═══════════════════════════════════════════════
//  Smart Cart BLE — pos burst handler
// ═══════════════════════════════════════════════
function handlePosBurst(event) {
  const data = event.target.value;
  if (data.byteLength < 1) return;

  const seq = data.getUint8(0) & 0x1F;
  if (seq === lastPacketSeq) return;
  if (lastPacketSeq >= 0 && seq !== ((lastPacketSeq + 1) & 0x1F)) {
    const lost = ((seq - lastPacketSeq - 1 + 32) & 0x1F);
    if (isRecording) console.warn(`[pos burst] seq gap: ${lastPacketSeq} → ${seq} (${lost} lost)`);
    posBurstCarry = [];
    lastSampleEndTime = 0;
  }
  lastPacketSeq = seq;

  const payload = [];
  for (let i = 1; i < data.byteLength; i++) payload.push(data.getUint8(i));
  const bytes = posBurstCarry.concat(payload);

  const nSamples = Math.floor(bytes.length / 2);
  const t_recv   = performance.now();

  let t0;
  if (lastSampleEndTime === 0) {
    t0 = t_recv - (nSamples - 1) * POS_PERIOD_MS;
  } else {
    t0 = lastSampleEndTime + POS_PERIOD_MS;
    const drift = (t0 + (nSamples - 1) * POS_PERIOD_MS) - t_recv;
    if (Math.abs(drift) > POS_PERIOD_MS * 15) {
      t0 = t_recv - (nSamples - 1) * POS_PERIOD_MS;
      if (isRecording) {
        if (Math.abs(drift) > 200) {
          bleStallCount++;
          console.warn(`[pos burst] BLE stall #${bleStallCount}: seq=${seq} drift=${drift.toFixed(1)}ms`);
        } else {
          console.warn(`[pos burst] clock re-anchor seq=${seq}: drift=${drift.toFixed(1)}ms`);
        }
      }
    }
  }

  let chartDirty = false;
  for (let i = 0; i < nSamples; i++) {
    const lo = bytes[2 * i];
    const hi = bytes[2 * i + 1];
    const raw = lo | (hi << 8);
    const rawChange = raw >= 0x8000 ? raw - 0x10000 : raw;
    if (Math.abs(rawChange) > RAW_CHANGE_MAX) {
      // BLE破損サンプル：警告のみで蓄積しない（蓄積すると位置・速度が崩壊する）
      if (isRecording) console.warn(`[pos burst] rawChange spike SKIPPED: seq=${seq} i=${i}/${nSamples} raw=${rawChange}`);
      continue;
    }
    countAccumulated += rawChange;
    const newPos = countAccumulated * POS_SCALE;
    const t_ms = t0 + i * POS_PERIOD_MS;

    if (lastNotifyTime > 0 && t_ms > lastNotifyTime) {
      latestVelocity = (newPos - lastNotifyPos) / ((t_ms - lastNotifyTime) / 1000);
    }
    lastNotifyTime = t_ms;
    lastNotifyPos  = newPos;
    latestPosition = newPos;

    if (isRecording) {
      const elapsed_s = (t_ms - recordStartTime) / 1000;
      posSession.push({ t_ms, elapsed_s, pos_m: newPos, vel_ms: latestVelocity });
    }

    if (isRecording && firstFreqRecvMs >= 0) {
      const t_chart_s = (t_ms - firstFreqRecvMs) / 1000;
      posValues.push(newPos);
      velValues.push(latestVelocity);
      posTimeValues.push(t_chart_s);
      const sliceV = velValues.slice(Math.max(0, velValues.length - VEL_SMOOTH_WIN));
      velSmoothValues.push(sliceV.reduce((a, b) => a + b, 0) / sliceV.length);
      chartDirty = true;
    }
  }

  lastSampleEndTime = t0 + (nSamples - 1) * POS_PERIOD_MS;
  posBurstCarry = bytes.slice(nSamples * 2);

  if (chartDirty) {
    while (posValues.length > MAX_POINTS) {
      posValues.shift(); velValues.shift(); velSmoothValues.shift(); posTimeValues.shift();
    }
    drawChart(ctxPos, posValues, '#0077cc', posTimeValues, document.getElementById('posAxisLabel'), 'm');
    drawVelChart(ctxVel, velValues, velSmoothValues, posTimeValues, document.getElementById('velAxisLabel'));
  }

  if (posAckChar && (seq & 0x07) === 0x07) {
    posAckChar.writeValueWithoutResponse(
      new Uint8Array([0x00, 0x00, 0x00, 0x00, seq])
    ).catch(() => {});
  }
}

// ═══════════════════════════════════════════════
//  ESP32 I/Q センサ BLE notify
// ═══════════════════════════════════════════════
function onFreqNotify(event) {
  if (!isRecording) return;

  const dv = event.target.value;
  if (!dv || dv.byteLength < PACKET_TOTAL_BYTES) {
    log(`[freq] short packet: ${dv ? dv.byteLength : 0} B (expected ${PACKET_TOTAL_BYTES})`);
    return;
  }

  const t_esp_s   = dv.getFloat32(0,  true);
  const freq_hz   = dv.getFloat32(4,  true);
  const amplitude = dv.getFloat32(8,  true);
  const theta_raw = dv.getFloat32(12, true);
  // Stage 2a-r1: diag word = (drop_delta<<16) | (dt_us & 0xFFFF)
  const diag      = dv.getUint32(16,  true);
  const dt_us     = diag & 0xFFFF;            // 下位16bit (dt_us mod 65536)
  const drop_delta = (diag >>> 16) & 0xFFFF;  // 上位16bit (このブロックの DMA drop 数)
  if (drop_delta > 0) totalDropCount += drop_delta;

  if (firstFreqEspTime < 0) firstFreqEspTime = t_esp_s;
  const elapsed_s = t_esp_s - firstFreqEspTime;

  const t_recv_ms = performance.now();
  if (firstFreqRecvMs < 0) firstFreqRecvMs = t_recv_ms;
  const t_true_ms = firstFreqRecvMs + elapsed_s * 1000 - SAMPLING_TAIL_MS;

  let gap_ok = true;
  if (prevFreqEspTime >= 0) {
    const gap_ms = (t_esp_s - prevFreqEspTime) * 1000;
    if (gap_ms > FREQ_GAP_THRESHOLD_MS) {
      gap_ok = false;
      log(`[freq] gap: ${gap_ms.toFixed(0)} ms`);
    }
  }
  prevFreqEspTime = t_esp_s;

  // ── 振幅重み付き θ-回帰 (中央化窓 ±1) で freq_clean を生成 ─────
  // 1) gap / drop / 起動過渡 / 低振幅 / firmware 無効 のいずれかなら
  //    θ-tracking を破棄 (連続性が切れたため)。
  // 2) 連続区間では theta_raw を unwrap して polyBuffer 末尾に追加。
  // 3) バッファに 3 フレーム揃ったら、振幅重み付き線形回帰で 位相微分
  //    (slope) を計算し、freq_clean = F0 + slope/(2π) を **中央フレーム
  //    (buf[1] = 現在から 1 frame 前)** に back-fill する。窓幅 ±50ms は
  //    CSV vel (`posCentralDiffVel(halfWin=5)` の半窓 ±50ms) と一致し、
  //    両者の anticipation 量が揃って加速開始時の視覚的整合も取れる。
  //    現フレームの freq_clean は常に null で push し、後続 1 frame で
  //    back-fill される (表示は最新点から ~50ms 遅れて伸びる)。
  freqFrameCount++;
  let freq_clean = null;

  // ヒステリシスゲート: tracking 中なら HOLD (=150) で維持、break 後は ENTRY (=200) で再開。
  // ターンアラウンド付近の単発 amp dip (multipath null で 1 frame だけ amp が 150-200 に
  // 落ちる) を吸収して 150ms 程度のグラフ途切れを防ぐ。
  const ampGate = freqTracking ? FREQ_AMP_GATE_HOLD : FREQ_AMP_GATE_ENTRY;
  const tracking_break = (freqFrameCount <= FREQ_STARTUP_SKIP)
                      || !gap_ok
                      || (drop_delta > 0)
                      || (freq_hz <= 0)
                      || (amplitude < ampGate);

  if (tracking_break) {
    resetThetaTracking();
  } else {
    freqTracking = true;
    if (thetaUnwrappedAcc === null) {
      thetaUnwrappedAcc = 0;
      thetaLastRaw      = theta_raw;
      thetaLastT        = elapsed_s;
    } else {
      // PLL-guided unwrap:
      //   素朴な「|dθ| ≤ π なら補正不要」だと、真の slope が ±π/dt に近い
      //   (= ±10 Hz/50ms) と外れ値ノイズが重なった瞬間に間違った側を選び、
      //   一度誤った unwrap は累積 θ に永続的バイアスを与える (sign flip 事故)。
      // 解決: 直前 fit の slope (rad/s) から次の dθ を予測し、
      //   候補 {dth + 2πk} の中から予測に最も近いものを採用する。
      // 起動直後で lastSlope が無いときは生 freq_hz から代理予測する。
      // dt は実測差分（ヒステリシスで amp dip を跨いだ場合は >50ms になる）。
      const dt = elapsed_s - thetaLastT;
      const pred_dth = (lastSlopeRadPerS !== null)
        ? lastSlopeRadPerS * dt
        : (freq_hz - F0) * 2 * Math.PI * dt;
      let dth = theta_raw - thetaLastRaw;
      const k = Math.round((pred_dth - dth) / (2 * Math.PI));
      dth += k * 2 * Math.PI;
      thetaUnwrappedAcc += dth;
      thetaLastRaw       = theta_raw;
      thetaLastT         = elapsed_s;
    }
    polyBuffer.push({ t: elapsed_s, theta: thetaUnwrappedAcc, amp: amplitude });
    while (polyBuffer.length > FREQ_POLY_WIN) polyBuffer.shift();

    const fit = fitFreqFromTheta();
    if (fit) {
      // PLL 用の slope を更新 (次フレームの unwrap 予測に使う)。
      // 3-tap 中央化窓の slope は最新フレームから 1 frame 前 (50ms) の値を
      // 表すが、unwrap 予測誤差は < 2π/dt なので問題なし。
      lastSlopeRadPerS = fit.slope;
      // 中央化 back-fill: buf[1] = 現在から 1 frame 前 = freqSession の
      //   pre-push 時点で length-1 に位置する (freqSession.push は後段)。
      //   ⌐ freq_hz と比較する outlier ガードも 中央フレームの raw 値で行う。
      const centerIdx = freqSession.length - 1;
      if (centerIdx >= 0) {
        const centerEntry   = freqSession[centerIdx];
        const centerFreqHz  = centerEntry.freq_hz;
        // 異常 outlier ガード: 回帰推定が中央フレームの生 freq_hz と大きく
        // 乖離するなら unwrap がまだ安定していない可能性が高いので破棄。
        if (Math.abs(fit.freq - centerFreqHz) <= FREQ_GAP_GATE_HZ) {
          centerEntry.freq_clean = fit.freq;
          // 表示用 freqValues も同じ位置を back-fill (1:1 対応)
          const chartIdx = freqValues.length - 1;
          if (chartIdx >= 0) freqValues[chartIdx] = fit.freq;
        }
      }
    }
  }

  freqSession.push({ t_true_ms, elapsed_s, freq_hz, freq_clean, amplitude, gap_ok,
                     theta_raw, dt_us, drop_delta });
  updateAmpIndicator(amplitude);

  // NULL フレームも push（drawFreqChart は <=0 を line break として扱う）。
  // こうしないと、低振幅で freq_clean が NULL の区間を直線で繋いでしまい、
  // ターンアラウンド付近で「速度変化より先に freq が上昇」して見える錯覚を生む。
  {
    freqValues.push(freq_clean !== null ? freq_clean : -1);
    const adjTrueMs = t_true_ms + samplingTailAdjMs;
    const freq_t_chart_s = (adjTrueMs - firstFreqRecvMs) / 1000;
    freqTimeValues.push(freq_t_chart_s);
    if (freqValues.length > MAX_POINTS) { freqValues.shift(); freqTimeValues.shift(); }
    drawFreqChart(ctxFreq, freqValues, freqTimeValues,
                  document.getElementById('freqAxisLabel'));
  }

  if (freqSession.length % 5 === 0) drawScatter();

  updateStats();
}

// ═══════════════════════════════════════════════
//  時間軸ヘルパー
// ═══════════════════════════════════════════════
function drawTimeAxis(ctx, tMin, tMax, PAD_L, PAD_T, plotW, plotH) {
  if (tMax <= tMin) return;
  const toX = t => PAD_L + (t - tMin) / (tMax - tMin) * plotW;

  const span        = tMax - tMin;
  const targetTicks = Math.max(6, Math.min(10, Math.floor(plotW / 120)));
  const steps       = [0.2, 0.5, 1, 2, 5, 10, 20, 30, 60];
  const step        = steps.find(s => span / s <= targetTicks) || 60;
  const minorStep   = step >= 1 ? step / 2 : step;
  const yBase       = PAD_T + plotH;

  ctx.save();
  ctx.font = '10px "Share Tech Mono",monospace';
  ctx.textAlign = 'center';
  ctx.lineWidth = 1;

  if (minorStep < step) {
    for (let s = Math.ceil(tMin / minorStep) * minorStep; s <= tMax + 1e-9; s += minorStep) {
      if (Math.abs(Math.round(s / step) * step - s) < 1e-6) continue;
      const x = toX(s);
      ctx.strokeStyle = 'rgba(160,185,210,0.18)';
      ctx.beginPath(); ctx.moveTo(x, PAD_T); ctx.lineTo(x, yBase); ctx.stroke();
      ctx.strokeStyle = 'rgba(100,120,140,0.4)';
      ctx.beginPath(); ctx.moveTo(x, yBase); ctx.lineTo(x, yBase + 3); ctx.stroke();
    }
  }
  for (let s = Math.ceil(tMin / step) * step; s <= tMax + 1e-9; s += step) {
    const x = toX(s);
    ctx.strokeStyle = 'rgba(160,185,210,0.35)';
    ctx.beginPath(); ctx.moveTo(x, PAD_T); ctx.lineTo(x, yBase); ctx.stroke();
    ctx.strokeStyle = 'rgba(100,120,140,0.65)';
    ctx.beginPath(); ctx.moveTo(x, yBase); ctx.lineTo(x, yBase + 5); ctx.stroke();
    ctx.fillStyle = '#6b8099';
    ctx.fillText(Number.isInteger(step) ? s.toFixed(0) : s.toFixed(1), x, yBase + 15);
  }
  ctx.strokeStyle = 'rgba(100,120,140,0.3)';
  ctx.beginPath(); ctx.moveTo(PAD_L, yBase); ctx.lineTo(PAD_L + plotW, yBase); ctx.stroke();
  ctx.restore();
}

// ═══════════════════════════════════════════════
//  Canvas 描画
// ═══════════════════════════════════════════════
const ctxPos     = document.getElementById('chartPos').getContext('2d');
const ctxVel     = document.getElementById('chartVel').getContext('2d');
const ctxFreq    = document.getElementById('chartFreq').getContext('2d');
const ctxScatter = document.getElementById('chartScatter').getContext('2d');

function drawChart(ctx, data, color, times, labelEl, unit) {
  const W = ctx.canvas.width, H = ctx.canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);
  if (data.length < 2) return;

  const PAD_L = 62, PAD_R = 12, PAD_T = 12, PAD_B = 34;
  const plotW = W - PAD_L - PAD_R;
  const plotH = H - PAD_T - PAD_B;

  let min = Math.min(...data), max = Math.max(...data);
  if (Math.abs(max - min) < 0.001) { min -= 0.1; max += 0.1; }
  const range = max - min;

  const toY = v => PAD_T + plotH - ((v - min) / range) * plotH;
  const useTimes = times && times.length === data.length && times[times.length - 1] > times[0];

  let tMin = 0, tMax = 1;
  if (useTimes && times.length > 0) {
    tMax = recordEndTime_s > 0 ? recordEndTime_s : times[times.length - 1];
    tMin = -tMax * 0.025;
  } else if (!useTimes) {
    tMax = data.length - 1;
  }
  const toX = i => PAD_L + ((useTimes ? times[i] : i) - tMin) / (tMax - tMin) * plotW;

  ctx.strokeStyle = 'rgba(160,185,210,0.5)';
  ctx.lineWidth = 1;
  for (let k = 0; k <= 4; k++) {
    const y   = PAD_T + (k / 4) * plotH;
    const val = max - (k / 4) * range;
    ctx.beginPath(); ctx.moveTo(PAD_L, y); ctx.lineTo(PAD_L + plotW, y); ctx.stroke();
    ctx.fillStyle = '#6b8099';
    ctx.font      = '10px "Share Tech Mono", monospace';
    ctx.textAlign = 'right';
    ctx.fillText(val.toFixed(unit === 'Hz' ? 1 : 3), PAD_L - 6, y + 4);
  }

  if (min < 0 && max > 0) {
    const y0 = toY(0);
    ctx.strokeStyle = 'rgba(100,120,140,0.7)';
    ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.moveTo(PAD_L, y0); ctx.lineTo(PAD_L + plotW, y0); ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.strokeStyle = color;
  ctx.lineWidth   = 2;
  ctx.beginPath();
  for (let i = 0; i < data.length; i++) {
    i === 0 ? ctx.moveTo(toX(i), toY(data[i])) : ctx.lineTo(toX(i), toY(data[i]));
  }
  ctx.stroke();

  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(toX(data.length - 1), toY(data[data.length - 1]), 4, 0, Math.PI * 2);
  ctx.fill();

  if (useTimes) drawTimeAxis(ctx, tMin, tMax, PAD_L, PAD_T, plotW, plotH);

  if (labelEl) {
    const dec = unit === 'Hz' ? 2 : 3;
    labelEl.textContent = `min ${min.toFixed(dec)} / max ${max.toFixed(dec)} ${unit}`;
  }
}

function drawVelChart(ctx, rawData, smoothData, times, labelEl) {
  const W = ctx.canvas.width, H = ctx.canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);
  if (rawData.length < 2) return;

  const PAD_L = 62, PAD_R = 12, PAD_T = 12, PAD_B = 34;
  const plotW = W - PAD_L - PAD_R, plotH = H - PAD_T - PAD_B;
  const all = rawData.concat(smoothData);
  let min = Math.min(...all), max = Math.max(...all);
  if (Math.abs(max - min) < 0.001) { min -= 0.1; max += 0.1; }
  const range = max - min;
  const toY = v => PAD_T + plotH - ((v - min) / range) * plotH;
  const useTimes = times && times.length === rawData.length && times[times.length - 1] > times[0];
  let tMin = 0, tMax = 1;
  if (useTimes && times.length > 0) {
    tMax = recordEndTime_s > 0 ? recordEndTime_s : times[times.length - 1];
    tMin = -tMax * 0.025;
  } else if (!useTimes) {
    tMax = rawData.length - 1;
  }
  const toX = i => PAD_L + ((useTimes ? times[i] : i) - tMin) / (tMax - tMin) * plotW;

  ctx.strokeStyle = 'rgba(160,185,210,0.5)'; ctx.lineWidth = 1;
  for (let k = 0; k <= 4; k++) {
    const y = PAD_T + (k / 4) * plotH;
    ctx.beginPath(); ctx.moveTo(PAD_L, y); ctx.lineTo(PAD_L + plotW, y); ctx.stroke();
    ctx.fillStyle = '#6b8099'; ctx.font = '10px "Share Tech Mono",monospace'; ctx.textAlign = 'right';
    ctx.fillText((max - (k / 4) * range).toFixed(3), PAD_L - 6, y + 4);
  }
  if (min < 0 && max > 0) {
    const y0 = toY(0);
    ctx.strokeStyle = 'rgba(100,120,140,0.7)'; ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.moveTo(PAD_L, y0); ctx.lineTo(PAD_L + plotW, y0); ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.strokeStyle = 'rgba(74,140,0,0.25)'; ctx.lineWidth = 1.2;
  ctx.beginPath();
  for (let i = 0; i < rawData.length; i++)
    i === 0 ? ctx.moveTo(toX(i), toY(rawData[i])) : ctx.lineTo(toX(i), toY(rawData[i]));
  ctx.stroke();
  if (smoothData.length >= 2) {
    ctx.strokeStyle = '#4a8c00'; ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < smoothData.length; i++)
      i === 0 ? ctx.moveTo(toX(i), toY(smoothData[i])) : ctx.lineTo(toX(i), toY(smoothData[i]));
    ctx.stroke();
    ctx.fillStyle = '#4a8c00';
    ctx.beginPath(); ctx.arc(toX(smoothData.length-1), toY(smoothData[smoothData.length-1]), 4, 0, Math.PI*2); ctx.fill();
  }
  if (useTimes) drawTimeAxis(ctx, tMin, tMax, PAD_L, PAD_T, plotW, plotH);
  if (labelEl) {
    const vLast = smoothData.length > 0 ? smoothData[smoothData.length-1] : rawData[rawData.length-1];
    labelEl.textContent = `last(avg) ${vLast.toFixed(3)} m/s  |  min ${min.toFixed(3)} / max ${max.toFixed(3)} m/s`;
  }
}

function drawFreqChart(ctx, rawDataIn, times, labelEl) {
  const W = ctx.canvas.width, H = ctx.canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);
  if (rawDataIn.length < 2) return;

  // cal_factor (= F0 / fRef) を表示時に乗じて、生徒に見せる縦軸を 2000 Hz 基準に
  // スケールする。<= 0 はライン break 用の sentinel なのでそのまま残す。
  const cf = calibrationFactor();
  const data = rawDataIn.map(v => v > 0 ? v * cf : v);

  const PAD_L = 62, PAD_R = 12, PAD_T = 12, PAD_B = 34;
  const plotW = W - PAD_L - PAD_R, plotH = H - PAD_T - PAD_B;
  const valid = data.filter(v => v > 0);
  if (valid.length === 0) return;
  let min = Math.min(...valid), max = Math.max(...valid);
  if (Math.abs(max - min) < 0.5) { min -= 1; max += 1; }
  const range = max - min;
  const toY = v => PAD_T + plotH - ((v - min) / range) * plotH;
  const useTimes = times && times.length === data.length && times[times.length - 1] > times[0];
  let tMin = 0, tMax = 1;
  if (useTimes && times.length > 0) {
    tMax = recordEndTime_s > 0 ? recordEndTime_s : times[times.length - 1];
    tMin = -tMax * 0.025;
  } else if (!useTimes) {
    tMax = data.length - 1;
  }
  const toX = i => PAD_L + ((useTimes ? times[i] : i) - tMin) / (tMax - tMin) * plotW;

  ctx.strokeStyle = 'rgba(160,185,210,0.5)'; ctx.lineWidth = 1;
  for (let k = 0; k <= 4; k++) {
    const y = PAD_T + (k / 4) * plotH;
    ctx.beginPath(); ctx.moveTo(PAD_L, y); ctx.lineTo(PAD_L + plotW, y); ctx.stroke();
    ctx.fillStyle = '#6b8099'; ctx.font = '10px "Share Tech Mono",monospace'; ctx.textAlign = 'right';
    ctx.fillText((max - (k / 4) * range).toFixed(2), PAD_L - 6, y + 4);
  }
  // 短い NULL gap (≤500ms) を細い点線で視覚補間して連続感を出す。
  // 深い multipath null での 5-6 frame の途切れも、ここで補完して見せる。
  // データ自体は NULL のままなので CSV/scatter 解析の整合性は保たれる。
  // (algorithmic bridging は PLL 予測がターンアラウンド付近の v 反転で破綻し、
  //  R² が 0.96→0.7 に低下するため不採用 — gap は本物の SNR ゼロ区間)。
  // 起動 skip 用の長 gap (>500ms) は補間しない (本物の "no data")。
  const GAP_BRIDGE_S = 0.5;
  if (useTimes) {
    // 控えめな点線: 短いダッシュ + 広いギャップで「データ補間中」を主張しすぎない
    ctx.strokeStyle = 'rgba(204,102,0,0.25)'; ctx.lineWidth = 1; ctx.setLineDash([1,4]);
    let lastValidIdx = -1;
    for (let i = 0; i < data.length; i++) {
      if (data[i] <= 0) continue;
      if (lastValidIdx >= 0 && i > lastValidIdx + 1) {
        const dt = times[i] - times[lastValidIdx];
        if (dt > 0 && dt <= GAP_BRIDGE_S) {
          ctx.beginPath();
          ctx.moveTo(toX(lastValidIdx), toY(data[lastValidIdx]));
          ctx.lineTo(toX(i), toY(data[i]));
          ctx.stroke();
        }
      }
      lastValidIdx = i;
    }
    ctx.setLineDash([]);
  }

  // freq_clean 実線 (NULL 区間は line break)
  ctx.strokeStyle = '#cc6600'; ctx.lineWidth = 2;
  ctx.beginPath();
  let started = false;
  for (let i = 0; i < data.length; i++) {
    if (data[i] <= 0) { started = false; continue; }
    started ? ctx.lineTo(toX(i), toY(data[i])) : ctx.moveTo(toX(i), toY(data[i]));
    started = true;
  }
  ctx.stroke();
  const lastValid = [...data].reverse().find(v => v > 0);
  const lastIdx   = data.length - 1 - [...data].reverse().findIndex(v => v > 0);
  if (lastValid > 0) {
    ctx.fillStyle = '#cc6600';
    ctx.beginPath(); ctx.arc(toX(lastIdx), toY(lastValid), 4, 0, Math.PI * 2); ctx.fill();
  }
  if (useTimes) drawTimeAxis(ctx, tMin, tMax, PAD_L, PAD_T, plotW, plotH);
  if (labelEl) {
    labelEl.textContent = `last ${(lastValid ?? 0).toFixed(2)} Hz  |  min ${min.toFixed(2)} / max ${max.toFixed(2)} Hz`;
  }
}

//  振幅インジケーター（旧スペクトル品質バッジの代替）

function updateAmpIndicator(amplitude) {
  const badge  = document.getElementById('sQualityBadge');
  const detail = document.getElementById('sQualityDetail');
  let text, color;
  let hint;
  if (amplitude >= 400)      { text = 'GOOD'; color = '#008855'; hint = ''; }
  else if (amplitude >= 200) { text = 'LOW';  color = '#b86e00'; hint = '→ スピーカーの音量を上げてください'; }
  else                       { text = 'POOR'; color = '#d42045'; hint = '→ スピーカーの音量を上げてください'; }

}

// ═══════════════════════════════════════════════
//  f₀ 推定（静止時周波数の中央値）
// ═══════════════════════════════════════════════
function computeFRef() {
  const stationaryFreqs = freqSession
    .filter(f => f.freq_hz > 0)
    .map(f => {
      const p = interpolatePos(f.t_true_ms + samplingTailAdjMs);
      return p && Math.abs(p.vel_ms) < 0.08 ? f.freq_hz : null;
    })
    .filter(v => v !== null);
  if (stationaryFreqs.length >= 3) {
    stationaryFreqs.sort((a, b) => a - b);
    return stationaryFreqs[Math.floor(stationaryFreqs.length / 2)];
  }
  const allFreqs = freqSession
    .filter(f => f.freq_hz > 0)
    .map(f => f.freq_hz);
  if (allFreqs.length >= 3) {
    allFreqs.sort((a, b) => a - b);
    return allFreqs[Math.floor(allFreqs.length / 2)];
  }
  return F0;  // フォールバック
}

// ═══════════════════════════════════════════════
//  散布図（v vs. Δf）— V_MAX=2.0 m/s, DF_MAX=12 Hz
// ═══════════════════════════════════════════════
function drawScatter() {
  if (!ctxScatter) return;
  const W = ctxScatter.canvas.width, H = ctxScatter.canvas.height;
  ctxScatter.clearRect(0, 0, W, H);
  ctxScatter.fillStyle = '#ffffff';
  ctxScatter.fillRect(0, 0, W, H);

  const PAD_L = 62, PAD_R = 20, PAD_T = 16, PAD_B = 36;
  const plotW = W - PAD_L - PAD_R, plotH = H - PAD_T - PAD_B;

  // ±2 m/s → max Δf ≈ ±11.7 Hz → DF_MAX=12 Hz
  const V_MAX = 2.0, DF_MAX = 12;
  const toX = v  => PAD_L + (v + V_MAX) / (2 * V_MAX) * plotW;
  const toY = df => PAD_T + plotH - (df + DF_MAX) / (2 * DF_MAX) * plotH;

  ctxScatter.strokeStyle = 'rgba(160,185,210,0.45)'; ctxScatter.lineWidth = 1;
  const vTicks  = [-2,-1,0,1,2];
  const dfTicks = [-8,-4,0,4,8];
  vTicks.forEach(v => {
    const x = toX(v);
    ctxScatter.beginPath(); ctxScatter.moveTo(x, PAD_T); ctxScatter.lineTo(x, PAD_T+plotH); ctxScatter.stroke();
    ctxScatter.fillStyle='#6b8099'; ctxScatter.font='10px "Share Tech Mono",monospace'; ctxScatter.textAlign='center';
    ctxScatter.fillText(v.toFixed(0), x, PAD_T+plotH+14);
  });
  dfTicks.forEach(df => {
    const y = toY(df);
    ctxScatter.beginPath(); ctxScatter.moveTo(PAD_L, y); ctxScatter.lineTo(PAD_L+plotW, y); ctxScatter.stroke();
    ctxScatter.fillStyle='#6b8099'; ctxScatter.font='10px "Share Tech Mono",monospace'; ctxScatter.textAlign='right';
    ctxScatter.fillText(df.toFixed(0), PAD_L-6, y+4);
  });
  ctxScatter.fillStyle='#6b8099'; ctxScatter.font='11px "Exo 2",sans-serif'; ctxScatter.textAlign='center';
  ctxScatter.fillText('velocity  v  (m/s)', PAD_L + plotW/2, PAD_T+plotH+28);
  ctxScatter.save(); ctxScatter.translate(14, PAD_T+plotH/2); ctxScatter.rotate(-Math.PI/2);
  ctxScatter.fillText('Δf (Hz)', 0, 0); ctxScatter.restore();

  ctxScatter.strokeStyle='rgba(100,120,140,0.8)'; ctxScatter.setLineDash([4,3]); ctxScatter.lineWidth=1;
  ctxScatter.beginPath(); ctxScatter.moveTo(toX(0),PAD_T); ctxScatter.lineTo(toX(0),PAD_T+plotH); ctxScatter.stroke();
  ctxScatter.beginPath(); ctxScatter.moveTo(PAD_L,toY(0)); ctxScatter.lineTo(PAD_L+plotW,toY(0)); ctxScatter.stroke();
  ctxScatter.setLineDash([]);

  const fRef    = computeFRef();
  const cf      = calibrationFactor();
  const f0_disp = fRef * cf;          // 表示用 f₀ (= F0 = 2000 Hz)
  const VS = 343.0;

  // 理論曲線（cal_factor 適用済み f₀ で描画）
  ctxScatter.strokeStyle = '#222'; ctxScatter.lineWidth = 2;
  ctxScatter.beginPath();
  let first = true;
  for (let i = -200; i <= 200; i++) {
    const v = i * V_MAX / 200;
    const df = f0_disp * v / VS;
    if (Math.abs(df) > DF_MAX * 1.1) { first = true; continue; }
    const x = toX(v), y = toY(df);
    first ? ctxScatter.moveTo(x, y) : ctxScatter.lineTo(x, y);
    first = false;
  }
  ctxScatter.stroke();

  // データ収集（Δf も cal_factor 適用後の値で算出 → 理論線と同じスケール）
  const HALF_WIN = CSV_VEL_HALF_WIN;
  const n = freqSession.length;
  const pts = [];
  for (let i = 0; i < n; i++) {
    const f = freqSession[i];
    if (f.freq_clean === null) continue;
    const ip = interpolatePos(f.t_true_ms + samplingTailAdjMs, HALF_WIN);
    if (!ip || ip.vel_ms === null) continue;
    const v = ip.vel_ms;
    if (Math.abs(v) > V_MAX) continue;
    pts.push({ v, df: (f.freq_clean - fRef) * cf });
  }

  // freq_clean 点（橙）— グラフと同じ系列を使用して教材の一貫性を保つ
  pts.forEach(p => {
    const x = toX(p.v), y = toY(p.df);
    if (x < PAD_L || x > PAD_L+plotW || y < PAD_T || y > PAD_T+plotH) return;
    ctxScatter.beginPath(); ctxScatter.arc(x, y, 4.5, 0, Math.PI*2);
    ctxScatter.fillStyle = 'rgba(204,102,0,0.75)'; ctxScatter.fill();
  });

  // 理論式テキストのみ（fit / R² は教育上、生徒が自分で計算する）
  ctxScatter.font = '10px "Share Tech Mono",monospace'; ctxScatter.textAlign='left';
  ctxScatter.fillStyle='#222';
  ctxScatter.fillText(`理論 (低速近似): Δf = f₀·v/vₛ  f₀=${f0_disp.toFixed(2)} Hz  vₛ=343 m/s`, PAD_L+6, PAD_T+14);

  const infoEl = document.getElementById('scatterInfo');
  if (infoEl) {
    const runStr = scatterRunCount > 1 ? ` / ${scatterRunCount} runs pooled` : '';
    infoEl.textContent = `${pts.length} pts${runStr}`;
  }
}

// ═══════════════════════════════════════════════
//  統計表示
// ═══════════════════════════════════════════════
function updateStats() {
  if (posSession.length > 0) {
    const last = posSession[posSession.length - 1];
    document.getElementById('sPosLast').textContent = last.pos_m.toFixed(3) + ' m';
    const vSmooth = velSmoothValues.length > 0 ? velSmoothValues[velSmoothValues.length-1] : last.vel_ms;
    document.getElementById('sVelLast').textContent = vSmooth.toFixed(3) + ' m/s';
  }
  // 絶対周波数表示は f0 校正係数 (= F0/fRef) を掛けて 2000 Hz 基準にスケール。
  // ESP32 xtal の絶対バイアス (~ -3 Hz @ 2 kHz) を見かけ上 0 にして、
  // 学校現場で「2000 Hz 音源 → 表示 2000.0 Hz」となるようにする。
  const cf = calibrationFactor();
  // グラフ・scatter・CSV と同じく freq_clean (θ-回帰) を表示。
  // freq_clean が未確定の起動直後だけ raw freq_hz にフォールバック。
  const lastClean = [...freqSession].reverse().find(f => f.freq_clean !== null);
  const lastRaw   = [...freqSession].reverse().find(f => f.freq_hz > 0);
  const fShowSrc  = lastClean ? lastClean.freq_clean : (lastRaw ? lastRaw.freq_hz : null);
  if (fShowSrc !== null) {
    document.getElementById('sFreqLast').textContent = (fShowSrc * cf).toFixed(1) + ' Hz';
  }
  const fRef = computeFRef();
  const lastAmp = freqSession.length > 0 ? (freqSession[freqSession.length-1].amplitude ?? 0) : 0;
  const dropLabel = totalDropCount > 0 ? `  drop ${totalDropCount}` : '';
  document.getElementById('sFRefAmp').textContent =
    `${(fRef * cf).toFixed(1)} Hz  /  ${lastAmp.toFixed(0)}${dropLabel}`;
}

// ═══════════════════════════════════════════════
//  Cart streaming arm sequence
//  GATT 接続後、および Record 開始時に呼ぶ。Record 中の失敗で cart 内部
//  ストリーミングエンジンが停止 (ACK back-off 等) した場合、再アームで復活する。
//  GATT が切れていれば writeValueWithoutResponse が throw し、catch で検出可能。
// ═══════════════════════════════════════════════
async function armCartStreaming() {
  if (!posCmdChar || !cartDevCmdChar) throw new Error('cart not connected');
  await posCmdChar.writeValueWithoutResponse(
    new Uint8Array([0x01, 0x10, 0x27, 0x00, 0x00, 0x02, 0x00])
  );
  log('Sent pos rate: 100Hz.');
  await cartDevCmdChar.writeValueWithoutResponse(new Uint8Array([0x37, 0x01, 0x01]));
  log('Sent WIRELESS_RMS_START (streaming).');
  await new Promise(r => setTimeout(r, 200));
  await posCmdChar.writeValueWithoutResponse(new Uint8Array([0x05, 0x10]));
  await new Promise(r => setTimeout(r, 100));
  await cartDevCmdChar.writeValueWithoutResponse(new Uint8Array([0x06, 0xaf, 0x05]));
  await new Promise(r => setTimeout(r, 50));
  await cartDevCmdChar.writeValueWithoutResponse(new Uint8Array([0x00]));
  log('Sent start trigger.');
}

// ═══════════════════════════════════════════════
//  BLE 接続
// ═══════════════════════════════════════════════
//
// macOS ネイティブ全画面（緑ボタン / View > Enter Full Screen）では Chrome の
// Bluetooth デバイス選択ダイアログがツールバー基準で画面上端=0 にアンカーされ、
// 上半分が画面外へはみ出して機種を選べない。これは Chrome/macOS 側の仕様で、
// ダイアログ位置はページから一切制御できない。Fullscreen API は緑ボタン全画面
// では発火しないため、「ブラウザ chrome が消えてビューポートがほぼ画面全体」を
// 実測ヒューリスティックで推定し、ペアリング開始前に確認ダイアログで案内する。
// 戻り値 true = 中止すべき（ユーザーがキャンセル）。
function blockedByMacFullscreen() {
  const isMac = /Mac/i.test(navigator.platform || navigator.userAgent || '');
  if (!isMac) return false;
  const chromeless = (screen.height - window.innerHeight) < 80;
  const atTop      = (window.screenY || window.screenTop || 0) === 0;
  if (!(chromeless && atTop)) return false;
  return !window.confirm(
    '全画面表示を検出しました。\n\n' +
    'この状態では Bluetooth デバイス選択ダイアログが画面上端からはみ出し、' +
    'デバイスを選べないことがあります（Chrome / macOS の仕様）。\n\n' +
    '推奨: ⌃⌘F で全画面を解除してから「Connect」を押してください。\n\n' +
    'このまま接続を続けますか？'
  );
}

// ─── Smart Cart ───
async function connectSmartCart() {
  if (blockedByMacFullscreen()) return;
  try {
    setCartStatus('SCANNING...');
    log('Requesting Smart Cart ...');
    cartDevice = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: 'Smart Cart' }],
      optionalServices: ALL_PASCO_UUIDS
    });
    log(`Device: ${cartDevice.name}`);
    cartDevice.addEventListener('gattserverdisconnected', onCartDisconnected);

    const server = await cartDevice.gatt.connect();
    log('GATT connected.');

    const posSvc = await server.getPrimaryService(POSITION_SERVICE);
    const chars  = await posSvc.getCharacteristics();
    log(`Position service: ${chars.length} char(s)`);

    const devSvc  = await server.getPrimaryService(DEVICE_SERVICE);
    cartDevCmdChar = await devSvc.getCharacteristic(DEVICE_CMD_CHAR);
    const devRecv = await devSvc.getCharacteristic('4a5c0000-0003-0000-0000-5c1e741f1c00');
    await devRecv.startNotifications();
    devRecv.addEventListener('characteristicvaluechanged', (e) => {
      const b = Array.from(new Uint8Array(e.target.value.buffer))
        .map(x => x.toString(16).padStart(2,'0')).join(' ');
      log(`[dev recv] ${b}`);
    });

    posCmdChar = await posSvc.getCharacteristic(POSITION_CMD_CHAR);
    posAckChar = await posSvc.getCharacteristic(POSITION_ACK_CHAR);

    const char0004 = await posSvc.getCharacteristic(POSITION_BURST_CHAR);
    await char0004.startNotifications();
    char0004.addEventListener('characteristicvaluechanged', handlePosBurst);
    log('Subscribed to pos burst (0004).');

    await armCartStreaming();

    isCartConnected = true;
    setCartStatus('CONNECTED: ' + cartDevice.name, true);
    updateButtonStates();
  } catch (e) {
    console.error(e);
    log('Cart ERROR: ' + e.message);
    setCartStatus('ERROR');
  }
}

function onCartDisconnected() {
  isCartConnected = false;
  setCartStatus('DISCONNECTED');
  stopRecording();
  updateButtonStates();
}

function setCartStatus(text, connected = false) {
  document.getElementById('cartBadge').className =
    'status-badge' + (connected ? ' connected' : '');
  document.getElementById('cartText').textContent = 'CART: ' + text;
}

// ═══════════════════════════════════════════════
//  BLE 接続 — I/Q Freq Sensor (ESP32)
// ═══════════════════════════════════════════════
async function connectFreqSensor() {
  if (blockedByMacFullscreen()) return;
  try {
    setFreqStatus('SCANNING...');
    log('Requesting Freq Sensor ...');
    freqDevice = await navigator.bluetooth.requestDevice({
      filters: [{ services: ['environmental_sensing'] }]
    });
    log(`Freq device: ${freqDevice.name}`);
    freqDevice.addEventListener('gattserverdisconnected', onFreqDisconnected);

    const server  = await freqDevice.gatt.connect();
    const service = await server.getPrimaryService('environmental_sensing');
    freqChar      = await service.getCharacteristic('analog');
    await freqChar.startNotifications();
    freqChar.addEventListener('characteristicvaluechanged', onFreqNotify);
    log('Freq sensor ready.');

    isFreqConnected = true;
    setFreqStatus('CONNECTED: ' + freqDevice.name, true);
    updateButtonStates();
  } catch (e) {
    console.error(e);
    log('Freq Sensor ERROR: ' + e.message);
    setFreqStatus('ERROR');
  }
}

function onFreqDisconnected() {
  isFreqConnected  = false;

// ═══════════════════════════════════════════════
//  ボタン状態管理
// ═══════════════════════════════════════════════
function updateButtonStates() {
  const anyConnected = isCartConnected || isFreqConnected;
  document.getElementById('btnStart').disabled = !anyConnected || isRecording;
  document.getElementById('btnStop').disabled  = !isRecording;
  document.getElementById('btnReset').disabled = !anyConnected;
}

// ═══════════════════════════════════════════════
//  録画開始 / 停止 / リセット
// ═══════════════════════════════════════════════
async function startRecording() {
  isRecording     = true;
  recordStartTime = performance.now();
  // 位置系: countAccumulated は **保持** する (Reset 押した位置を絶対 origin とする)。
  //   過去の試行で「Start 時に countAccumulated=0 強制」した結果、pos=0 の意味が
  //   「Reset 位置」→「Start 位置」に変わり、ユーザの実験運用 (Reset→引いて→Start
  //   →放して home に戻る) で「往復後 pos=0 にならない」現象を生んだため revert。
  //   pos[0] が非ゼロになるのは Reset と Start の間に cart が動いた場合のみで、
  //   実験開始位置で Reset を押せば自然に pos[0]=0 になる。
  latestVelocity  = 0;
  lastNotifyTime  = 0;
  lastNotifyPos   = 0;
  bleStallCount   = 0;
  scatterRunCount += 1;  // §4.4-M: 累積モードで走行カウンタを増加
  log(`Recording started (run #${scatterRunCount}).`);
  prevFreqEspTime  = -1;
  firstFreqEspTime = -1;
  firstFreqRecvMs  = -1;
  freqFrameCount    = 0;
  totalDropCount    = 0;
  lastSlopeRadPerS  = null;  // セッション境界: 前回の slope は引き継がない
  resetThetaTracking();
  updateButtonStates();
  // Note: かつて Record 開始時に armCartStreaming() を呼んでいたが、
  //   cart 側で 0x00 start trigger 等を再送する 350ms の間に encoder counter
  //   の挙動が乱れ、往復後の位置がドリフトする副作用が観測されたため撤回 (2026-05-11)。
  //   「Reset+Start で cart データが来ない」現象が再発した場合は、Cart を再接続する
  //   (connectSmartCart 内で armCartStreaming が clean に走る)。
}

function stopRecording() {
  if (!isRecording) return;
  isRecording = false;

  if (freqSession.length > 0) {
    recordEndTime_s = freqSession[freqSession.length - 1].elapsed_s;
  } else if (posSession.length > 0) {
    recordEndTime_s = posSession[posSession.length - 1].elapsed_s;
  }

  const hasData = posSession.length > 0 || freqSession.length > 0;
  document.getElementById('btnCsv').disabled = !hasData;
  updateButtonStates();
  const stallNote = bleStallCount > 0 ? ` (BLE stall ${bleStallCount} 回検出)` : '';
  log(`Recording stopped. pos=${posSession.length} frames, freq=${freqSession.length} frames${stallNote}. (BLE subscription remains active)`);

  drawChart(ctxPos, posValues, '#0077cc', posTimeValues, document.getElementById('posAxisLabel'), 'm');
  drawVelChart(ctxVel, velValues, velSmoothValues, posTimeValues, document.getElementById('velAxisLabel'));
  drawFreqChart(ctxFreq, freqValues, freqTimeValues, document.getElementById('freqAxisLabel'));
  drawScatter();
}

function resetAll() {
  stopRecording();
  countAccumulated = 0; lastPacketSeq = -1; posBurstCarry = []; lastSampleEndTime = 0;
  latestPosition = 0;
  latestVelocity = 0; lastNotifyTime = 0; lastNotifyPos = 0;
  prevFreqEspTime  = -1;
  firstFreqEspTime = -1;
  firstFreqRecvMs  = -1;
  freqFrameCount    = 0;
  totalDropCount    = 0;
  lastSlopeRadPerS  = null;  // セッション境界
  resetThetaTracking();
  recordEndTime_s   = 0;
  scatterRunCount   = 0;  // §4.4-M: 走行カウンタもリセット
  posSession = []; freqSession = [];
  posValues = []; velValues = []; velSmoothValues = []; freqValues = [];
  posTimeValues = []; freqTimeValues = [];
  ['sPosLast','sVelLast','sFreqLast','sFRefAmp'].forEach(id => {
    document.getElementById(id).textContent = '—';
  });
  ['posAxisLabel','velAxisLabel','freqAxisLabel','scatterInfo'].forEach(id => {
    document.getElementById(id).textContent = '';
  });
  document.getElementById('btnCsv').disabled = true;
  [ctxPos, ctxVel, ctxFreq, ctxScatter].forEach(ctx => {
    if (ctx) ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
  });
  const qb = document.getElementById('sQualityBadge');
  if (qb) { qb.textContent = '—'; qb.style.color = 'var(--dim)'; }
  const qd = document.getElementById('sQualityDetail');
  if (qd) qd.textContent = '';

  // Cart の「100Hz 位置バーストモード」を再確立する。
  //   このモードは揮発性で、Stop/Reset を挟むアイドル（特に CSV 出力中の
  //   フォーカス喪失）で Cart 側がデフォルト状態（WIRELESS_RMS のみ）に
  //   戻ってしまい、同じ characteristic に位置でないデータを流し始めるため、
  //   パーサが全サンプル rawChange spike で破棄して「Cart データが来ない」
  //   症状になる。connectSmartCart を再度押せば armCartStreaming が走って
  //   復活することが実機で確認できているので、Reset で同じことをする。
  //   - resetAll 内で既に countAccumulated=0, lastPacketSeq=-1, posBurstCarry=[],
  //     lastSampleEndTime=0 を初期化済 → 再アーム中の encoder glitch
  //     (2026-05-11 に startRecording から撤去した理由) は新原点で吸収される。
  //   - 失敗時 (Cart 未接続・GATT 断) は warning のみで握りつぶす。
  if (isCartConnected) {
    armCartStreaming().catch(e => {
      console.warn('[reset] armCartStreaming failed:', e);
      log(`[reset] re-arm failed: ${e.message}`);
    });
  }
}

// ═══════════════════════════════════════════════
//  pos 補間ヘルパー
// ═══════════════════════════════════════════════
function interpolatePos(t_ms, halfWin) {
  const n = posSession.length;
  if (n === 0) return null;
  if (t_ms <= posSession[0].t_ms) {
    const v = halfWin > 0 ? posCentralDiffVel(0, halfWin) : posSession[0].vel_ms;
    return { pos_m: posSession[0].pos_m, vel_ms: v, t_ms_nearest: posSession[0].t_ms };
  }
  const last = posSession[n - 1];
  if (t_ms >= last.t_ms) {
    const v = halfWin > 0 ? posCentralDiffVel(n - 1, halfWin) : last.vel_ms;
    return { pos_m: last.pos_m, vel_ms: v, t_ms_nearest: last.t_ms };
  }
  let lo = 0, hi = n - 1;
  while (hi - lo > 1) {
    const mid = (lo + hi) >> 1;
    if (posSession[mid].t_ms <= t_ms) lo = mid; else hi = mid;
  }
  const p0 = posSession[lo], p1 = posSession[hi];
  const dt  = p1.t_ms - p0.t_ms;
  const alpha = dt > 0 ? (t_ms - p0.t_ms) / dt : 0;
  const pos_m = p0.pos_m + alpha * (p1.pos_m - p0.pos_m);
  let vel_ms;
  if (halfWin > 0) {
    const v0 = posCentralDiffVel(lo, halfWin);
    const v1 = posCentralDiffVel(hi, halfWin);
    vel_ms = (v0 !== null && v1 !== null) ? v0 + alpha * (v1 - v0)
           : (v0 !== null ? v0 : v1);
  } else {
    vel_ms = p0.vel_ms + alpha * (p1.vel_ms - p0.vel_ms);
  }
  return { pos_m, vel_ms, t_ms_nearest: alpha <= 0.5 ? p0.t_ms : p1.t_ms };
}

function posCentralDiffVel(posIdx, halfWin) {
  const n = posSession.length;
  if (posIdx < 0 || n === 0) return null;
  const lo = Math.max(0, posIdx - halfWin);
  const hi = Math.min(n - 1, posIdx + halfWin);
  const m = hi - lo + 1;
  if (m < 2) return null;
  const tRef = posSession[(lo + hi) >> 1].t_ms;
  let st = 0, sp = 0, stt = 0, stp = 0;
  for (let k = lo; k <= hi; k++) {
    const dt = (posSession[k].t_ms - tRef) / 1000;
    const p  = posSession[k].pos_m;
    st += dt; sp += p; stt += dt * dt; stp += dt * p;
  }
  const denom = m * stt - st * st;
  return Math.abs(denom) < 1e-15 ? null : (m * stp - st * sp) / denom;
}

// ═══════════════════════════════════════════════
//  CSV 出力
//  列: elapsed_s, pos_m, vel_ms, freq_clean, amplitude
//  freq_clean は cal_factor 適用済み（2000 Hz 基準）の値。
// ═══════════════════════════════════════════════
function buildCsv() {
  if (freqSession.length > 0) {
    let out = '時間(s),位置(m),速度(m/s),周波数(Hz),振幅\n';

    const HALF_WIN = CSV_VEL_HALF_WIN;
    const cf       = calibrationFactor();
    const n = freqSession.length;

    for (let i = 0; i < n; i++) {
      const f = freqSession[i];
      const adjTrueMs = f.t_true_ms + samplingTailAdjMs;

      const ip = interpolatePos(adjTrueMs, HALF_WIN);
      let pos_m_str = '', vel_ms_str = '';
      if (ip) {
        pos_m_str  = ip.pos_m.toFixed(6);
        if (ip.vel_ms !== null) vel_ms_str = ip.vel_ms.toFixed(6);
      }

      const freq_clean_str = f.freq_clean !== null ? (f.freq_clean * cf).toFixed(4) : '';
      const amp_str        = f.amplitude  != null  ? f.amplitude.toFixed(4)         : '';

      out += `${f.elapsed_s.toFixed(4)},${pos_m_str},${vel_ms_str},`
           + `${freq_clean_str},${amp_str}\n`;
    }
    return out;
  }
  let out = 'elapsed_s,pos_m,vel_ms\n';
  for (const p of posSession) {
    out += `${p.elapsed_s.toFixed(4)},${p.pos_m.toFixed(6)},${p.vel_ms.toFixed(6)}\n`;
  }
  return out;
}

function showCsvModal() {
  const csv  = buildCsv();
  const rows = csv.split('\n').length - 2;
  document.getElementById('csvOutput').value          = csv;
  document.getElementById('csvRowCount').textContent  = `${rows} rows`;
  document.getElementById('csvModal').classList.add('open');
}

// ═══════════════════════════════════════════════
//  イベントリスナー
// ═══════════════════════════════════════════════
document.getElementById('btnConnectCart').addEventListener('click', connectSmartCart);
document.getElementById('btnConnectFreq').addEventListener('click', connectFreqSensor);
document.getElementById('btnStart').addEventListener('click', startRecording);
document.getElementById('btnStop').addEventListener('click',  stopRecording);
document.getElementById('btnReset').addEventListener('click', resetAll);
document.getElementById('btnCsv').addEventListener('click',   showCsvModal);

document.getElementById('btnCloseModal').addEventListener('click', () => {
  document.getElementById('csvModal').classList.remove('open');
});
document.getElementById('btnCopy').addEventListener('click', () => {
  const ta = document.getElementById('csvOutput');
  ta.select();
  navigator.clipboard.writeText(ta.value).catch(() => document.execCommand('copy'));
});
document.getElementById('btnDownload').addEventListener('click', () => {
  // 先頭に UTF-8 BOM を付けて Excel (日本語版) が Shift-JIS と誤認しないようにする
  const blob = new Blob(['﻿', buildCsv()], { type: 'text/csv;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  // ファイル名はローカル時刻で YYYY-MM-DD_HHMMSS（UTC の ISO 形式は
  // 日本時間と 9 時間ずれて分かりにくいため。"_iq_" は IQ 法導入時の
  // 旧版との区別用で現在は不要なので削除）
  const _d = new Date();
  const _p = n => String(n).padStart(2, '0');
  const _stamp = `${_d.getFullYear()}-${_p(_d.getMonth() + 1)}-${_p(_d.getDate())}`
               + `_${_p(_d.getHours())}${_p(_d.getMinutes())}${_p(_d.getSeconds())}`;
  a.download = `doppler_${_stamp}.csv`;
  a.click();
  URL.revokeObjectURL(url);
});

// ─── Canvas リサイズ（ビューポート適応）─────────────
//
// 設計方針:
//   - 位置/速度/周波数は常に縦積み（時間軸共有）。散布図は横軸が速度なので
//     独立で、画面幅 ≥1200px のとき時系列スタックの右へ、未満では下へ回る
//     （レイアウト自体は CSS 側 .chart-area の row/column 切替で実現）。
//   - 縦の利用可能量を window.innerHeight から「グラフ以外の枠」を実測して
//     差し引き、残りを各 canvas に重み配分（最小高さでクランプ）。
//   - 計測と再描画はこの関数内のみ（load / debounce 付き resize /
//     ブレークポイント跨ぎ）で行い、BLE 受信のホットパスには一切足さない。
//   - getComputedStyle で実測するため @media 圧縮も自動で反映される。
//   - スクロール非依存のため getBoundingClientRect は使わず offsetHeight と
//     padding/gap の実測値のみで枠を積算する。

const WIDE_MQ = window.matchMedia('(min-width: 1200px)');

// canvas 高さの重み（旧固定値の比）と視認性の下限（標準: 読みやすさ優先）
const CH_WEIGHT = { pos: 180, vel: 140, freq: 180, scat: 260 };
const CH_MIN    = { pos: 120, vel:  90, freq: 120, scat: 150 };

function _sumStyle(el, ...props) {
  const cs = getComputedStyle(el);
  return props.reduce((s, p) => s + (parseFloat(cs[p]) || 0), 0);
}
// panel 内で canvas が使えない分（縦 padding + 縦 border + chart-header の実高）
function _panelChrome(panel) {
  const hdr = panel.querySelector('.chart-header');
  return _sumStyle(panel, 'paddingTop', 'paddingBottom', 'borderTopWidth', 'borderBottomWidth')
       + (hdr ? hdr.offsetHeight : 0);
}

function resizeCanvases() {
  const posPanel = ctxPos.canvas.parentElement;
  const velPanel = ctxVel.canvas.parentElement;
  const frqPanel = ctxFreq.canvas.parentElement;
  const scPanel  = ctxScatter.canvas.parentElement;

  // ---- 幅: 各 canvas は親パネルの内寸いっぱい（横 padding を実測）----
  for (const ctx of [ctxPos, ctxVel, ctxFreq, ctxScatter]) {
    const p = ctx.canvas.parentElement;
    ctx.canvas.width = Math.max(220,
      Math.round(p.clientWidth - _sumStyle(p, 'paddingLeft', 'paddingRight')));
  }

  // ---- 縦: グラフ以外の枠をスクロール非依存で積算 ----
  const mainEl   = document.querySelector('main');
  const headerEl = document.querySelector('header');
  const footerEl = document.querySelector('footer');
  const controls = document.querySelector('.controls');
  const strip    = document.querySelector('.info-strip');
  const chartArea= document.querySelector('.chart-area');
  const tsCol    = document.querySelector('.timeseries-col');
  const axisEl   = document.querySelector('.shared-time-axis');

  const mainGap = parseFloat(getComputedStyle(mainEl).rowGap) || 0; // main 子: controls / info-strip / chart-area → gap ×2
  const tsGap   = parseFloat(getComputedStyle(tsCol).rowGap)   || 0; // tsCol 子: pos/vel/freq/axis → gap ×3
  const areaGap = parseFloat(getComputedStyle(chartArea).rowGap)|| 0; // 縦並び時 chart-area 子間 ×1

  const budget = Math.max(0,
      window.innerHeight
    - headerEl.offsetHeight
    - footerEl.offsetHeight
    - _sumStyle(mainEl, 'paddingTop', 'paddingBottom')
    - controls.offsetHeight
    - strip.offsetHeight
    - mainGap * 2
    - 24 /* 端数・サブピクセル・スクロールバー安全マージン */);

  const wide = WIDE_MQ.matches;
  const clampH = (v, m) => Math.max(m, Math.round(v));

  if (wide) {
    // 散布図は右隣 → 時系列カラムが縦予算を総取り、散布図は同じ高さに伸びる
    const tsChrome = _panelChrome(posPanel) + _panelChrome(velPanel) + _panelChrome(frqPanel)
                   + axisEl.offsetHeight + tsGap * 3;
    const tsCanvas = Math.max(0, budget - tsChrome);
    const sw = CH_WEIGHT.pos + CH_WEIGHT.vel + CH_WEIGHT.freq;
    ctxPos.canvas.height  = clampH(tsCanvas * CH_WEIGHT.pos  / sw, CH_MIN.pos);
    ctxVel.canvas.height  = clampH(tsCanvas * CH_WEIGHT.vel  / sw, CH_MIN.vel);
    ctxFreq.canvas.height = clampH(tsCanvas * CH_WEIGHT.freq / sw, CH_MIN.freq);
    ctxScatter.canvas.height = clampH(budget - _panelChrome(scPanel), CH_MIN.scat);
  } else {
    // 4枚すべて縦積み → 予算を 4 分割
    const allChrome = _panelChrome(posPanel) + _panelChrome(velPanel)
                    + _panelChrome(frqPanel) + _panelChrome(scPanel)
                    + axisEl.offsetHeight + tsGap * 3 + areaGap * 1;
    const cBudget = Math.max(0, budget - allChrome);
    const sw = CH_WEIGHT.pos + CH_WEIGHT.vel + CH_WEIGHT.freq + CH_WEIGHT.scat;
    ctxPos.canvas.height     = clampH(cBudget * CH_WEIGHT.pos  / sw, CH_MIN.pos);
    ctxVel.canvas.height     = clampH(cBudget * CH_WEIGHT.vel  / sw, CH_MIN.vel);
    ctxFreq.canvas.height    = clampH(cBudget * CH_WEIGHT.freq / sw, CH_MIN.freq);
    ctxScatter.canvas.height = clampH(cBudget * CH_WEIGHT.scat / sw, CH_MIN.scat);
  }

  drawChart(ctxPos,  posValues,  '#0077cc', posTimeValues,  document.getElementById('posAxisLabel'),  'm');
  drawVelChart(ctxVel, velValues, velSmoothValues, posTimeValues, document.getElementById('velAxisLabel'));
  drawFreqChart(ctxFreq, freqValues, freqTimeValues, document.getElementById('freqAxisLabel'));
  drawScatter();
}

let _resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(resizeCanvases, 120);
});
WIDE_MQ.addEventListener('change', resizeCanvases);  // 1200px ブレークポイント跨ぎ
resizeCanvases();
// Web フォント確定後にレイアウトが微変するので一度だけ再計測
if (document.fonts && document.fonts.ready) document.fonts.ready.then(resizeCanvases);

</script>
